<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobius Coffee｜後台 Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="brand-mark">∞</span>
      <span>Mobius Admin</span>
    </a>
    <nav class="nav visible">
      <a href="index.html">回前台</a>
    </nav>
  </header>

  <main class="admin-page">
    <section class="section">
      <div class="section-head">
        <p class="eyebrow">Admin Demo</p>
        <h1>後台管理展示</h1>
        <p>這不是正式登入系統，而是作品集展示用的後台版面。</p>
      </div>

      <div class="dashboard">
        <article class="stat">
          <span>今日訂位</span>
          <strong>12</strong>
        </article>
        <article class="stat">
          <span>活動報名</span>
          <strong>38</strong>
        </article>
        <article class="stat">
          <span>菜單品項</span>
          <strong>24</strong>
        </article>
      </div>

      <div class="admin-grid">
        <section class="panel">
          <h2>菜單管理</h2>
          <table>
            <tr><th>品項</th><th>分類</th><th>價格</th><th>狀態</th></tr>
            <tr><td>莫比烏斯拿鐵</td><td>咖啡</td><td>130</td><td>販售中</td></tr>
            <tr><td>黑糖布丁</td><td>甜點</td><td>90</td><td>販售中</td></tr>
            <tr><td>路人盃套餐</td><td>限定</td><td>250</td><td>活動中</td></tr>
          </table>
        </section>

        <section class="panel">
          <h2>最新訂位</h2>
          <ul class="admin-list">
            <li>王先生 · 2 位 · 週六 14:00</li>
            <li>林小姐 · 4 位 · 週日 16:30</li>
            <li>陳先生 · 1 位 · 今天 19:00</li>
          </ul>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
